syntax = "proto3";

option csharp_namespace = "backend.Protos";

package meridian;

// Remote Procedure Call definition managing corporate metrics and chat integrations
service EmployeeRpcService {
  rpc UpdateHybridSchedule(UpdateScheduleRequest) returns (LoginResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc GetEmployees (UserHeartbeatRequest) returns (stream EmployeeListResponse);

  // Chat Integration Endpoints
  rpc SendMessage(ChatMessageRequest) returns (ChatWindowResponse);
  rpc ListenMessages(UserHeartbeatRequest) returns (stream ChatMessageResponse);
  rpc GetChatHistory(ChatHistoryRequest) returns (ChatHistoryResponse);
}

message EmptyRequest {}

// Context identifier payload for continuous connection streams
message UserHeartbeatRequest {
  int32 employee_id = 1;
}

message DepartmentResponse {
  int32 id = 1;
  string name = 2;
}

// Weekly work distribution map (true = In-Office, false = Remote)
message HybridScheduleResponse {
  bool monday = 1;
  bool tuesday = 2;
  bool wednesday = 3;
  bool thursday = 4;
  bool friday = 5;
}

// Aggregated employee profile contract
message EmployeeResponse {
  int32 id = 1;
  string first_name = 2;
  string last_name = 3;
  string slack_handle = 4;
  string hire_date = 5;
  DepartmentResponse department = 6;
  HybridScheduleResponse hybrid_schedule = 7;
  bool is_online = 8;
}

message EmployeeListResponse {
  repeated EmployeeResponse employees = 1;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  bool success = 1;
  string token = 2;
  EmployeeResponse employee = 3;
  string error_message = 4;
}

message UpdateScheduleRequest {
  int32 employee_id = 1;
  bool monday = 2;
  bool tuesday = 3;
  bool wednesday = 4;
  bool thursday = 5;
  bool friday = 6;
}

message ChatMessageRequest {
  int32 sender_id = 1;
  int32 receiver_id = 2;
  string text = 3;
}

message ChatMessageResponse {
  int32 sender_id = 1;
  int32 receiver_id = 2;
  string text = 3;
  string time = 4;
}

message ChatWindowResponse {
  bool success = 1;
}

message ChatHistoryRequest {
  int32 sender_id = 1;
  int32 receiver_id = 2;
}

message ChatHistoryResponse {
  repeated ChatMessageResponse messages = 1;
}