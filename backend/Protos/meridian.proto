syntax = "proto3";

option csharp_namespace = "backend.Protos";

package meridian;

service EmployeeRpcService {
  rpc UpdateHybridSchedule(UpdateScheduleRequest) returns (LoginResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc GetEmployees (EmptyRequest) returns (stream EmployeeListResponse);
}

message EmptyRequest {}

message DepartmentResponse {
  int32 id = 1;
  string name = 2;
}

message HybridScheduleResponse {
  bool monday = 1;
  bool tuesday = 2;
  bool wednesday = 3;
  bool thursday = 4;
  bool friday = 5;
}

message EmployeeResponse {
  int32 id = 1;
  string first_name = 2;
  string last_name = 3;
  string slack_handle = 4;
  string hire_date = 5;
  DepartmentResponse department = 6;
  HybridScheduleResponse hybrid_schedule = 7;
}

message EmployeeListResponse {
  repeated EmployeeResponse employees = 1;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  bool success = 1;
  string token = 2;
  EmployeeResponse employee = 3;
  string error_message = 4;
}

message UpdateScheduleRequest {
  int32 employee_id = 1;
  bool monday = 2;
  bool tuesday = 3;
  bool wednesday = 4;
  bool thursday = 5;
  bool friday = 6;
}